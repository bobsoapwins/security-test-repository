version: 2
updates:
  # Monitor GitHub Actions for updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    reviewers:
      - "bobsoapwins"
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 10
