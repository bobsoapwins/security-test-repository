name: Feature Request
description: Suggest a new feature or enhancement for this repository.
title: "[FEATURE] "
labels:
  - enhancement
  - needs-triage
assignees:
  - bobsoapwins
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to suggest an improvement! Please fill out the form below to help us understand your request.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the feature you are requesting.
      placeholder: Describe the feature in one or two sentences.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: What problem does this feature solve? Why is it needed?
      placeholder: Explain the use case or pain point driving this request.
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed Solution
      description: Describe the solution or behavior you would like to see.
      placeholder: How should the feature work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: List any alternative approaches or workarounds you have already considered.
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or references that may be helpful.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Submission Checklist
      options:
        - label: I have searched existing issues to confirm this has not already been requested.
          required: true
        - label: This request does not include any sensitive or confidential information.
          required: true
